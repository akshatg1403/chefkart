databases:
  - name: chefkart-db
    plan: free
    databaseName: chefkart
    user: chefkart_user

services:
  - type: web
    name: chefkart-api
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: chefkart-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://chefkart.vercel.app
